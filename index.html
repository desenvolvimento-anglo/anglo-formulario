<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Cartilha</title>

  <style>
    body {
      font-family: Arial;
      background: #f4f6f8;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: white;
      padding: 25px;
      border-radius: 10px;
      width: 400px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    h2 {
      text-align: center;
    }

    input[type="text"] {
      width: 70%;
      padding: 10px;
      /*margin: 10px auto 15px auto;*/
      display: block;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    .box {
      background: #eef3f7;
      padding: 10px;
      border-radius: 5px;
      margin-bottom: 15px;
      font-size: 14px;
    }

    /* ✅ Checkbox alinhado */
    label {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 10px;
    }

    /* ✅ Botão corrigido */
    button {
      width: 30%;
      padding: 10px;
      background: #007BFF;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      display: block;
      margin: 20px auto 0 auto;
    }

    button:hover {
      background: #0056b3;
    }

  </style>
</head>

<body>

<div class="container">

  <h2>Cartilha</h2>

  <div class="box">
    <b>Orientações:</b><br><br>
    - Leia atentamente todo o conteúdo da cartilha<br>
    - Após enviar, a cartilha será liberada automaticamente<br>
    - O download será feito após a confirmação
  </div>

  <input type="text" id="nome" placeholder="Digite seu nome completo">

  <label>
    <input type="checkbox" id="confirmo">
    Confirmo que recebi a cartilha
  </label>

  <button onclick="registrar()">Enviar</button>

</div>

<script>
function registrar() {
  const nome = document.getElementById("nome").value;
  const confirmo = document.getElementById("confirmo").checked;

  if (nome === "") {
    alert("Por favor, informe seu nome.");
    return;
  }

  if (!confirmo) {
    alert("É necessário confirmar o recebimento para continuar.");
    return;
  }

  fetch("https://script.google.com/macros/s/AKfycbwlYh8IgeYLXhJ1wKF-qoBPI9126jibhFQR81fV3dDor1L6dxvUxNOT0AcCj5HhiENC/exec", {
    method: "POST",
    body: new URLSearchParams({
      nome: nome,
      resposta: "Confirmo recebimento da cartilha"
    })
  })
  .then(() => {
    alert("Recebimento registrado com sucesso!");

    window.open("cartilha.pdf", "_blank");

    const link = document.createElement("a");
    link.href = "cartilha.pdf";
    link.download = "Cartilha.pdf";
    link.click();
  })
  .catch(() => {
    alert("Erro ao registrar!");
  });
}
</script>

</body>
</html>
