<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cartilha</title>

  <style>
    body {
      font-family: Arial;
      background: #f4f6f8;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 15px;
    }

    .container {
      background: white;
      padding: 25px;
      border-radius: 10px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    h2 {
      text-align: center;
    }

    input[type="text"] {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      margin-bottom: 15px;
      border-radius: 5px;
      border: 1px solid #ccc;
      box-sizing: border-box;
    }

    .box {
      background: #eef3f7;
      padding: 12px;
      border-radius: 5px;
      margin-bottom: 15px;
      font-size: 14px;
    }

    label {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 10px;
      font-size: 14px;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #007BFF;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      margin-top: 20px;
      font-size: 16px;
    }

    button:hover {
      background: #0056b3;
    }

    @media (min-width: 600px) {
      button {
        width: 200px;
        display: block;
        margin: 20px auto 0 auto;
      }
    }

    /* ✅ Mensagem personalizada */
    #mensagem {
      display: none;
      margin-top: 15px;
      text-align: center;
      padding: 10px;
      border-radius: 5px;
      font-weight: bold;
    }

    .sucesso {
      background: #d4edda;
      color: #155724;
    }

    .erro {
      background: #f8d7da;
      color: #721c24;
    }

  </style>
</head>

<body>

<div class="container">

  <h2>Cartilha</h2>

  <div class="box">
    <b>Orientações:</b><br><br>
    - Leia atentamente todo o conteúdo da cartilha<br>
    - Após enviar, a cartilha será liberada automaticamente<br>
    - O download será feito após a confirmação
  </div>

  <input type="text" id="nome" placeholder="Digite seu nome completo">

  <label>
    <input type="checkbox" id="confirmo">
    Confirmo que recebi a cartilha
  </label>

  <button onclick="registrar()">Enviar</button>

  <!-- ✅ Mensagem aparece aqui -->
  <div id="mensagem"></div>

</div>

<script>
function registrar() {
  const nome = document.getElementById("nome").value;
  const confirmo = document.getElementById("confirmo").checked;
  const msg = document.getElementById("mensagem");

  msg.style.display = "none";
  msg.className = "";

  if (nome === "") {
    msg.style.display = "block";
    msg.classList.add("erro");
    msg.innerText = "Por favor, informe seu nome.";
    return;
  }

  if (!confirmo) {
    msg.style.display = "block";
    msg.classList.add("erro");
    msg.innerText = "É necessário confirmar o recebimento.";
    return;
  }

  fetch("https://script.google.com/macros/s/AKfycbwlYh8IgeYLXhJ1wKF-qoBPI9126jibhFQR81fV3dDor1L6dxvUxNOT0AcCj5HhiENC/exec", {
    method: "POST",
    body: new URLSearchParams({
      nome: nome,
      resposta: "Confirmo recebimento da cartilha"
    })
  })
  .then(() => {
    msg.style.display = "block";
    msg.classList.add("sucesso");
    msg.innerText = "Anglo Cezanne informa: Recebimento registrado com sucesso!";

    window.open("cartilha.pdf", "_blank");

    const link = document.createElement("a");
    link.href = "cartilha.pdf";
    link.download = "Cartilha.pdf";
    link.click();
  })
  .catch(() => {
    msg.style.display = "block";
    msg.classList.add("erro");
    msg.innerText = "Erro ao registrar. Tente novamente.";
  });
}
</script>

</body>
</html>
